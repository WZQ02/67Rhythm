
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>67</title>
    <style>
        :root {
            --transspeed: .25s;
        }
        body {
            background-color: #000;
            overflow: hidden;
        }
        #debugText {
            position: fixed;
            left: 12px;
            top: 12px;
            z-index: 9999;
            color: #fff;
            font: 700 14px/1.2 monospace;
            letter-spacing: .08em;
            pointer-events: none;
            user-select: none;
        }
        #_6,#_7,#_6 svg,#_7 svg{
            position: absolute;
            fill: white;
            height: 100%;
            width: 100%;
            max-width: 35vw;
            max-height: 80vh;
            opacity: .67;
            transition: var(--transspeed) cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 1;
        }
        #_6 {
            left: 14vw;
            top: 10vh;
        }
        #_7 {
            right: 14vw;
            top: 10vh;
        }
        svg {
            height: 100%;
            width: 100%;
        }
        #lefthand,#righthand {
            position: absolute;
            fill: white;
            height: 100%;
            width: 100%;
            max-width: 60vw;
            top: 15vh;
            opacity: .67;
            transition: var(--transspeed) cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        #lefthand {
            left: -20vw;
        }
        #righthand {
            right: -20vw;
        }
        #_6.activated {
            transform: rotate(6.7deg) scale(1.2);
            opacity: 1;
        }
        #_7.activated {
            transform: rotate(-6.7deg) scale(1.2);
            opacity: 1;
        }
        #lefthand.activated,#righthand.activated {
            transform: translateY(-20vh);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="debugText"></div>
    <div id="numbers">
        <div id="lefthand">
            <svg viewBox="0 0 445.25 164.14">
                <path d="M0,88.5S209.91,29.26,366.65,11.88c14.88-1.65,12.33-12.84,31.85-11.81,19.52,1.03-2.57,8.22-2.57,8.22,0,0,27.74-5.65,36.98-5.65s8.56,3.94,1.11,5.74-5.82,1.46-5.82,1.46c0,0,17.55-4.37,17.04.51s-3.94,22.17-23.29,27.82c-19.35,5.65-25.68,4.11-39.81,3.08S76.7,171.37,0,163.83"/>
            </svg>
        </div>
        <div id="righthand">
            <svg viewBox="0 0 445.25 164.14">
                <path d="M445.25,88.5S235.34,29.26,78.6,11.88C63.71,10.23,66.27-.96,46.75.07s2.57,8.22,2.57,8.22c0,0-27.74-5.65-36.98-5.65s-8.56,3.94-1.11,5.74,5.82,1.46,5.82,1.46C17.05,9.83-.5,5.46.01,10.34s3.94,22.17,23.29,27.82c19.35,5.65,25.68,4.11,39.81,3.08,14.13-1.03,305.44,130.12,382.15,122.59"/>
            </svg>
        </div>
        <div id="_6" onmouseover="do67(6,true)" onmouseleave="do67(6,false)">
            <svg viewBox="0 0 167.2 265.27">
                <path d="M167.2,164.11c0,46.01-36.46,101.17-83.65,101.17S0,221.09,0,176.84C0,149.58,62.62,54.36,51.26,0l7.22,4.82,49.55,39.05c10.53,3.29,6.56,8.98.64,18.28l-35.97,56.58.88.59c6.74-2.64,14.07-3.81,21.39-3.81,38.39,0,72.22,4.64,72.22,48.6ZM123.12,189.66c0-22.27-15.53-37.81-37.51-37.81-24.03,0-41.03,15.24-41.03,37.81s16.41,38.98,39.86,38.98,38.69-15.83,38.69-38.98Z"/>
            </svg>
        </div>
        <div id="_7" onmouseover="do67(7,true)" onmouseleave="do67(7,false)">
            <svg viewBox="0 0 172.05 256.59">
                <path d="M124.16,38.13L20.1,54.39,0,26.01,172.05,0h0l-66.51,230.87s-13.57-1.93-55.87,25.72"/>
            </svg>
        </div>
    </div>

    <script>
        const debugText = document.getElementById('debugText')
        const _6 = document.getElementById('_6')
        const _7 = document.getElementById('_7')
        const lh = document.getElementById('lefthand')
        const rh = document.getElementById('righthand')
        const debugMode = new URLSearchParams(window.location.search).get('debug') === 'true'
        const clockAudioUrl = 'https://ccbsimulator.wzq02.top/assets/mp3/clock.mp3'
        const audioContext = new (window.AudioContext || window.webkitAudioContext)()
        let clockBuffer = null
        let last67time = Date.now()
        let interval = 0, itv = false, rotation_num = 0

        async function loadClockBuffer() {
            const response = await fetch(clockAudioUrl)
            const arrayBuffer = await response.arrayBuffer()
            clockBuffer = await audioContext.decodeAudioData(arrayBuffer)
        }

        function unlockAudioContext() {
            if (audioContext.state === 'suspended') {
                audioContext.resume().catch(() => {})
            }
        }

        function playClockSound() {
            if (!clockBuffer) return
            unlockAudioContext()
            const source = audioContext.createBufferSource()
            source.buffer = clockBuffer
            source.connect(audioContext.destination)
            source.start(0)
        }

        if (debugMode) {
            debugText.textContent = 'debug'
        } else {
            debugText.style.display = 'none'
        }

        loadClockBuffer().catch(() => {})
        window.addEventListener('pointerdown', unlockAudioContext, { passive: true })
        window.addEventListener('keydown', unlockAudioContext, { passive: true })
        window.addEventListener('touchstart', unlockAudioContext, { passive: true })

        function do67(num,bool) {
            if (itv) {
                let now = Date.now()
                interval = now - last67time
                last67time = now
                itv = false
            } else {
                itv = true
            }
            if (num == 6) {
                if (bool) {
                    _6.classList.add("activated")
                    lh.classList.add("activated")
                } else {
                    _6.classList.remove("activated")
                    lh.classList.remove("activated")
                }
            } else if (num == 7) {
                if (bool) {
                    _7.classList.add("activated")
                    rh.classList.add("activated")
                } else {
                    _7.classList.remove("activated")
                    rh.classList.remove("activated")
                }
            }
            if (debugMode && bool) {
                debugText.textContent += String(num)
                playClockSound()
            }
            if (interval < 250) {
                document.documentElement.style.setProperty("--transspeed",interval/1000+"s")
            } else {
                document.documentElement.style.setProperty("--transspeed",".25s")
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === '6') {do67(6,true); do67(7,false)}
            if (e.key === '7') {do67(7,true); do67(6,false)}
        })

        const THRESHOLD = 6.7;
        const TIMEOUT = 50;
        let lastTriggerTime = 0;

        function initMotionDetection() {
            window.addEventListener('devicemotion', (event) => {
                const now = Date.now();
                if (now - lastTriggerTime < TIMEOUT) return;
                const acc = event.acceleration;
                if (!acc || acc.y === null || acc.z === null) return;
                const cF = acc.y + acc.z;
                if (cF > THRESHOLD) {
                    if (rotation_num != 6) {
                        rotation_num = 6
                        do67(6,true); do67(7,false)
                    }
                    lastTriggerTime = now;
                } 
                else if (cF < -THRESHOLD) {
                    if (rotation_num != 7) {
                        rotation_num = 7
                        do67(7,true); do67(6,false)
                    }
                    lastTriggerTime = now;
                }
            });
        }
        initMotionDetection()
    </script>

</body>
</html>
